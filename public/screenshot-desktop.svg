<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    
    <!-- Accent Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Smooth drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  
  <!-- Subtle glowing background shapes -->
  <circle cx="200" cy="150" r="250" fill="#7c3aed" fill-opacity="0.05" filter="blur(80px)" />
  <circle cx="1080" cy="550" r="300" fill="#34d399" fill-opacity="0.03" filter="blur(100px)" />

  <!-- Header / Navigation Bar -->
  <g transform="translate(40, 30)">
    <!-- App Logo & Title -->
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#purpleGrad)" />
    <!-- Mini Shopping Basket icon on logo -->
    <path d="M 12 20 L 36 20 L 33 38 C 32 41, 30 42, 28 42 L 20 42 C 18 42, 16 41, 15 38 Z" fill="#ffffff" fill-opacity="0.9" />
    <path d="M 16 20 C 16 12, 32 12, 32 20" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    
    <text x="64" y="32" font-family="'Inter', system-ui, sans-serif" font-weight="bold" font-size="24" fill="#ffffff">Shop Calculator</text>
    <text x="250" y="30" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#71717a">v1.0 • Offline Ready</text>

    <!-- Header badges -->
    <g transform="translate(900, 8)">
      <rect x="0" y="0" width="130" height="32" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <circle cx="20" cy="16" r="5" fill="#10b981" />
      <text x="34" y="21" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="12" fill="#e4e4e7">PWA Active</text>
      
      <rect x="145" y="0" width="135" height="32" rx="16" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3" />
      <circle cx="165" cy="16" r="5" fill="#a78bfa" />
      <text x="179" y="21" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="12" fill="#c084fc">Local Ledger</text>
    </g>
  </g>

  <!-- Main Dashboard Grid -->
  <!-- Left Side: Smart Calculator Panel -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="360" height="570" rx="24" fill="#0c0c0e" stroke="#27272a" stroke-width="1.5" />
    <rect x="20" y="20" width="320" height="110" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" />
    
    <!-- Calc Display -->
    <text x="320" y="60" font-family="'JetBrains Mono', monospace" font-size="20" fill="#a1a1aa" text-anchor="end">150 + 250 + (1200 * 0.18)</text>
    <text x="320" y="110" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="36" fill="#34d399" text-anchor="end">1,616.00</text>
    
    <!-- Calc Keys -->
    <g transform="translate(20, 150)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="65" height="65" rx="16" fill="#27272a" /> <text x="32.5" y="38" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ef4444" text-anchor="middle">AC</text>
      <rect x="85" y="0" width="65" height="65" rx="16" fill="#27272a" /> <text x="117.5" y="38" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#a78bfa" text-anchor="middle">()</text>
      <rect x="170" y="0" width="65" height="65" rx="16" fill="#27272a" /> <text x="202.5" y="38" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#a78bfa" text-anchor="middle">%</text>
      <rect x="255" y="0" width="65" height="65" rx="16" fill="#7c3aed" /> <text x="287.5" y="38" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">÷</text>

      <!-- Row 2 -->
      <rect x="0" y="85" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="32.5" y="123" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">7</text>
      <rect x="85" y="85" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="117.5" y="123" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">8</text>
      <rect x="170" y="85" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="202.5" y="123" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">9</text>
      <rect x="255" y="85" width="65" height="65" rx="16" fill="#7c3aed" /> <text x="287.5" y="123" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">×</text>

      <!-- Row 3 -->
      <rect x="0" y="170" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="32.5" y="208" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">4</text>
      <rect x="85" y="170" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="117.5" y="208" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">5</text>
      <rect x="170" y="170" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="202.5" y="208" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">6</text>
      <rect x="255" y="170" width="65" height="65" rx="16" fill="#7c3aed" /> <text x="287.5" y="208" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">-</text>

      <!-- Row 4 -->
      <rect x="0" y="255" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="32.5" y="293" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">1</text>
      <rect x="85" y="255" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="117.5" y="293" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">2</text>
      <rect x="170" y="255" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="202.5" y="293" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">3</text>
      <rect x="255" y="255" width="65" height="65" rx="16" fill="#7c3aed" /> <text x="287.5" y="293" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">+</text>

      <!-- Row 5 -->
      <rect x="0" y="340" width="150" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="75" y="378" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">0</text>
      <rect x="170" y="340" width="65" height="65" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="202.5" y="378" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#ffffff" text-anchor="middle">.</text>
      <rect x="255" y="340" width="65" height="65" rx="16" fill="url(#emeraldGrad)" /> <text x="287.5" y="378" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#ffffff" text-anchor="middle">=</text>
    </g>
  </g>

  <!-- Right Side: Smart Features & Billing Dashboard -->
  <g transform="translate(420, 110)" filter="url(#shadow)">
    <!-- Main Panel -->
    <rect width="820" height="570" rx="24" fill="#0c0c0e" stroke="#27272a" stroke-width="1.5" />
    
    <!-- Top Stats Bar -->
    <g transform="translate(25, 25)">
      <!-- Card 1: Today's Bills -->
      <rect x="0" y="0" width="240" height="90" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="20" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#a1a1aa">Ledger Balance</text>
      <text x="20" y="70" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="24" fill="#ffffff">$14,250.00</text>
      
      <!-- Card 2: Savings/Discounts -->
      <rect x="265" y="0" width="240" height="90" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="285" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#a1a1aa">Active Items</text>
      <text x="285" y="70" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="24" fill="#a78bfa">12 Products</text>

      <!-- Card 3: Tax Summary -->
      <rect x="530" y="0" width="240" height="90" rx="16" fill="#18181b" stroke="#27272a" stroke-width="1" />
      <text x="550" y="35" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#a1a1aa">Tax Computed (GST)</text>
      <text x="550" y="70" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="24" fill="#34d399">18% ($216.00)</text>
    </g>

    <!-- Tab View: Invoice & Bill Maker -->
    <g transform="translate(25, 140)">
      <!-- Tab Headers -->
      <rect x="0" y="0" width="770" height="48" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" />
      
      <!-- Tab 1: Invoice (Active) -->
      <rect x="4" y="4" width="180" height="40" rx="8" fill="#7c3aed" />
      <text x="94" y="28" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">🧾 Bill Maker</text>
      
      <!-- Tab 2: Discounts -->
      <text x="294" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#a1a1aa" text-anchor="middle">🏷️ Discount Calc</text>

      <!-- Tab 3: GST/Tax -->
      <text x="494" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#a1a1aa" text-anchor="middle">📊 GST/VAT Calc</text>

      <!-- Tab 4: Ledger -->
      <text x="684" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#a1a1aa" text-anchor="middle">📓 Shop Ledger</text>
    </g>

    <!-- Interactive Active Tab Content: Invoice/Bill Maker -->
    <g transform="translate(25, 210)">
      <!-- Invoice table headers -->
      <rect x="0" y="0" width="770" height="40" rx="8" fill="#141417" />
      <text x="20" y="25" font-family="'Inter', sans-serif" font-weight="bold" font-size="13" fill="#71717a">ITEM</text>
      <text x="420" y="25" font-family="'Inter', sans-serif" font-weight="bold" font-size="13" fill="#71717a" text-anchor="end">QTY</text>
      <text x="560" y="25" font-family="'Inter', sans-serif" font-weight="bold" font-size="13" fill="#71717a" text-anchor="end">RATE</text>
      <text x="750" y="25" font-family="'Inter', sans-serif" font-weight="bold" font-size="13" fill="#71717a" text-anchor="end">TOTAL</text>

      <!-- Row 1 -->
      <g transform="translate(0, 50)">
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#ffffff">Premium Wireless Headphones</text>
        <text x="420" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">1</text>
        <text x="560" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">$150.00</text>
        <text x="750" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#ffffff" text-anchor="end">$150.00</text>
        <line x1="20" y1="35" x2="750" y2="35" stroke="#27272a" stroke-width="1" />
      </g>

      <!-- Row 2 -->
      <g transform="translate(0, 100)">
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#ffffff">Mechanical Keyboards (V3)</text>
        <text x="420" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">2</text>
        <text x="560" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">$125.00</text>
        <text x="750" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#ffffff" text-anchor="end">$250.00</text>
        <line x1="20" y1="35" x2="750" y2="35" stroke="#27272a" stroke-width="1" />
      </g>

      <!-- Row 3 -->
      <g transform="translate(0, 150)">
        <text x="20" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#ffffff">Dual-Port Fast USB Charger</text>
        <text x="420" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">3</text>
        <text x="560" y="22" font-family="'JetBrains Mono', monospace" font-size="14" fill="#e4e4e7" text-anchor="end">$40.00</text>
        <text x="750" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#ffffff" text-anchor="end">$120.00</text>
        <line x1="20" y1="35" x2="750" y2="35" stroke="#27272a" stroke-width="1" />
      </g>

      <!-- Invoice Summary / Actions -->
      <g transform="translate(0, 210)">
        <!-- Quick Input Row -->
        <rect x="20" y="10" width="300" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
        <text x="35" y="35" font-family="'Inter', sans-serif" font-size="13" fill="#71717a">Add new product...</text>
        
        <rect x="330" y="10" width="100" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
        <text x="380" y="35" font-family="'Inter', sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Add</text>
        
        <!-- Totals panel -->
        <g transform="translate(480, 10)">
          <text x="120" y="20" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">Subtotal:</text>
          <text x="270" y="20" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#ffffff" text-anchor="end">$520.00</text>
          
          <text x="120" y="50" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">VAT/GST (18%):</text>
          <text x="270" y="50" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#34d399" text-anchor="end">$93.60</text>

          <line x1="120" y1="65" x2="270" y2="65" stroke="#27272a" stroke-width="1" />

          <text x="120" y="90" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#ffffff">Grand Total:</text>
          <text x="270" y="90" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="20" fill="url(#purpleGrad)" text-anchor="end">$613.60</text>
        </g>
      </g>
    </g>
  </g>
</svg>
