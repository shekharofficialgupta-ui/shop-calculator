<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280" width="720" height="1280">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    
    <!-- Accent Purple Gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Smooth drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="720" height="1280" fill="url(#bgGrad)"/>
  
  <!-- Subtle glowing background shapes -->
  <circle cx="360" cy="200" r="300" fill="#7c3aed" fill-opacity="0.04" filter="blur(80px)" />
  <circle cx="360" cy="1000" r="300" fill="#34d399" fill-opacity="0.02" filter="blur(100px)" />

  <!-- Mobile Status Bar Mockup -->
  <g transform="translate(0, 0)">
    <!-- Background block -->
    <rect width="720" height="40" fill="#000000" fill-opacity="0.2" />
    <!-- Clock -->
    <text x="40" y="26" font-family="'Inter', sans-serif" font-weight="600" font-size="14" fill="#ffffff">9:41</text>
    <!-- Icons -->
    <g transform="translate(620, 14)">
      <!-- Signal -->
      <rect x="0" y="4" width="3" height="8" fill="#ffffff" />
      <rect x="5" y="2" width="3" height="10" fill="#ffffff" />
      <rect x="10" y="0" width="3" height="12" fill="#ffffff" />
      <!-- Battery -->
      <rect x="18" y="1" width="22" height="11" rx="2" fill="none" stroke="#ffffff" stroke-width="1" />
      <rect x="20" y="3" width="14" height="7" rx="1" fill="#ffffff" />
      <path d="M 40 4 L 40 9" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
    </g>
  </g>

  <!-- Header / Navigation Bar -->
  <g transform="translate(30, 70)">
    <!-- App Logo & Title -->
    <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#purpleGrad)" />
    <!-- Mini Shopping Basket icon on logo -->
    <path d="M 11 18 L 33 18 L 30 34 C 29 37, 27 38, 25 38 L 19 38 C 17 38, 15 37, 14 34 Z" fill="#ffffff" fill-opacity="0.9" />
    <path d="M 15 18 C 15 11, 29 11, 29 18" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    
    <text x="60" y="28" font-family="'Inter', system-ui, sans-serif" font-weight="bold" font-size="20" fill="#ffffff">Shop Calculator</text>
    <text x="60" y="44" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#71717a">v1.0 • Offline Friendly</text>

    <!-- Sync indicator -->
    <circle cx="630" cy="22" r="5" fill="#10b981" />
    <text x="610" y="26" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="end">READY</text>
  </g>

  <!-- Tab View: Invoice & Bill Maker -->
  <g transform="translate(30, 140)">
    <rect width="660" height="48" rx="12" fill="#121214" stroke="#27272a" stroke-width="1" />
    <!-- Tab 1 Active -->
    <rect x="4" y="4" width="160" height="40" rx="8" fill="#7c3aed" />
    <text x="84" y="28" font-family="'Inter', sans-serif" font-weight="bold" font-size="13" fill="#ffffff" text-anchor="middle">🧾 Bill Maker</text>
    
    <!-- Tab 2 -->
    <text x="245" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#a1a1aa" text-anchor="middle">🏷️ Discount</text>

    <!-- Tab 3 -->
    <text x="410" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#a1a1aa" text-anchor="middle">📊 GST</text>

    <!-- Tab 4 -->
    <text x="575" y="28" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#a1a1aa" text-anchor="middle">📓 Ledger</text>
  </g>

  <!-- Interactive Active Tab Content: Invoice/Bill Maker -->
  <g transform="translate(30, 215)" filter="url(#shadow)">
    <!-- Main Panel -->
    <rect width="660" height="500" rx="20" fill="#0c0c0e" stroke="#27272a" stroke-width="1" />
    
    <!-- Invoice table headers -->
    <rect x="15" y="15" width="630" height="40" rx="8" fill="#141417" />
    <text x="30" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#71717a">ITEM</text>
    <text x="350" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#71717a" text-anchor="end">QTY</text>
    <text x="470" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#71717a" text-anchor="end">RATE</text>
    <text x="615" y="40" font-family="'Inter', sans-serif" font-weight="bold" font-size="12" fill="#71717a" text-anchor="end">TOTAL</text>

    <!-- Row 1 -->
    <g transform="translate(15, 65)">
      <text x="15" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="13" fill="#ffffff">Premium Wireless Headphones</text>
      <text x="335" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">1</text>
      <text x="455" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">$150.00</text>
      <text x="600" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="13" fill="#ffffff" text-anchor="end">$150.00</text>
      <line x1="15" y1="35" x2="600" y2="35" stroke="#27272a" stroke-width="1" />
    </g>

    <!-- Row 2 -->
    <g transform="translate(15, 115)">
      <text x="15" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="13" fill="#ffffff">Mechanical Keyboards (V3)</text>
      <text x="335" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">2</text>
      <text x="455" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">$125.00</text>
      <text x="600" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="13" fill="#ffffff" text-anchor="end">$250.00</text>
      <line x1="15" y1="35" x2="600" y2="35" stroke="#27272a" stroke-width="1" />
    </g>

    <!-- Row 3 -->
    <g transform="translate(15, 165)">
      <text x="15" y="22" font-family="'Inter', sans-serif" font-weight="500" font-size="13" fill="#ffffff">Dual-Port Fast USB Charger</text>
      <text x="335" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">3</text>
      <text x="455" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#e4e4e7" text-anchor="end">$40.00</text>
      <text x="600" y="22" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="13" fill="#ffffff" text-anchor="end">$120.00</text>
      <line x1="15" y1="35" x2="600" y2="35" stroke="#27272a" stroke-width="1" />
    </g>

    <!-- Totals Area -->
    <g transform="translate(30, 360)">
      <text x="300" y="20" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">Subtotal:</text>
      <text x="585" y="20" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#ffffff" text-anchor="end">$520.00</text>
      
      <text x="300" y="50" font-family="'Inter', sans-serif" font-weight="500" font-size="14" fill="#a1a1aa">VAT/GST (18%):</text>
      <text x="585" y="50" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="14" fill="#34d399" text-anchor="end">$93.60</text>

      <line x1="300" y1="65" x2="585" y2="65" stroke="#27272a" stroke-width="1" />

      <text x="300" y="95" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#ffffff">Grand Total:</text>
      <text x="585" y="95" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="20" fill="url(#purpleGrad)" text-anchor="end">$613.60</text>
    </g>
  </g>

  <!-- Smart Calculator Section (Adapting for Mobile Layout - bottom portion) -->
  <g transform="translate(30, 740)" filter="url(#shadow)">
    <rect width="660" height="480" rx="20" fill="#0c0c0e" stroke="#27272a" stroke-width="1" />
    
    <!-- Tiny Calculator Display -->
    <rect x="20" y="20" width="620" height="80" rx="14" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="610" y="45" font-family="'JetBrains Mono', monospace" font-size="15" fill="#a1a1aa" text-anchor="end">150 + 250 + (1200 * 0.18)</text>
    <text x="610" y="75" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="24" fill="#34d399" text-anchor="end">1,616.00</text>

    <!-- Calc Buttons (optimized grid for mobile layout space) -->
    <g transform="translate(20, 115)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="135" height="55" rx="12" fill="#27272a" /> <text x="67.5" y="33" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ef4444" text-anchor="middle">AC</text>
      <rect x="155" y="0" width="135" height="55" rx="12" fill="#27272a" /> <text x="222.5" y="33" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#a78bfa" text-anchor="middle">%</text>
      <rect x="310" y="0" width="135" height="55" rx="12" fill="#27272a" /> <text x="377.5" y="33" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#a78bfa" text-anchor="middle">DEL</text>
      <rect x="465" y="0" width="155" height="55" rx="12" fill="#7c3aed" /> <text x="542.5" y="33" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#ffffff" text-anchor="middle">÷</text>

      <!-- Row 2 -->
      <rect x="0" y="70" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="67.5" y="103" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">7</text>
      <rect x="155" y="70" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="222.5" y="103" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">8</text>
      <rect x="310" y="70" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="377.5" y="103" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">9</text>
      <rect x="465" y="70" width="155" height="55" rx="12" fill="#7c3aed" /> <text x="542.5" y="103" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#ffffff" text-anchor="middle">×</text>

      <!-- Row 3 -->
      <rect x="0" y="140" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="67.5" y="173" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">4</text>
      <rect x="155" y="140" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="222.5" y="173" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">5</text>
      <rect x="310" y="140" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="377.5" y="173" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">6</text>
      <rect x="465" y="140" width="155" height="55" rx="12" fill="#7c3aed" /> <text x="542.5" y="173" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#ffffff" text-anchor="middle">-</text>

      <!-- Row 4 -->
      <rect x="0" y="210" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="67.5" y="243" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">1</text>
      <rect x="155" y="210" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="222.5" y="243" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">2</text>
      <rect x="310" y="210" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="377.5" y="243" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">3</text>
      <rect x="465" y="210" width="155" height="55" rx="12" fill="#7c3aed" /> <text x="542.5" y="243" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#ffffff" text-anchor="middle">+</text>

      <!-- Row 5 -->
      <rect x="0" y="280" width="290" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="145" y="313" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">0</text>
      <rect x="310" y="280" width="135" height="55" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1" /> <text x="377.5" y="313" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#ffffff" text-anchor="middle">.</text>
      <rect x="465" y="280" width="155" height="55" rx="12" fill="url(#emeraldGrad)" /> <text x="542.5" y="313" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#ffffff" text-anchor="middle">=</text>
    </g>
  </g>
</svg>
